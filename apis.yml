aid: agility-robotics
name: Agility Robotics
description: >-
  Agility Robotics is a Salem, Oregon humanoid robotics company building
  industrial bipedal robots for warehouse and factory automation. Founded
  in 2015 as a spin-out of Oregon State University's Dynamic Robotics
  Laboratory, its flagship product is Digit — described as the first
  humanoid robot in commercial production deployment — and Arc, the
  cloud-based automation platform that operates Digit fleets, provides
  real-time visibility, manages task assignments, and connects Digit to
  existing warehouse automation including AMRs, WMS, and WES systems.
  Digit has commercial deployments and pilots with Amazon, GXO Logistics,
  Schaeffler, Toyota Motor Manufacturing Canada, and Mercado Libre, with
  an expanded NVIDIA partnership for foundation-model and simulation
  tooling. Agility operates RoboFab, a humanoid robot factory in Salem,
  OR with capacity to produce 10,000 robots annually. Digit has surpassed
  100,000 totes moved in commercial deployment at a single Georgia
  facility. Agility Robotics does not publish a public developer API,
  SDK, or open-source release for Digit or Arc; integration is performed
  by Agility's solutions team and partners through a gated low-level
  JSON-over-WebSocket API and pysdk delivered with the robot. The
  company's public GitHub org primarily contains forks of infrastructure
  tooling (JFrog, Bazel, Fluent Bit, Kubernetes Cluster API) plus an
  archived documentation repo for the earlier Cassie research platform.
